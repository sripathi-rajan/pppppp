# ═══════════════════════════════════════════════════════════════════════════════
# DriveLegal — Netlify Build Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file tells Netlify how to build and deploy the Expo web frontend.
#
# Deploy Options:
#   1. Connect your GitHub repo to Netlify (auto-deploys on push)
#   2. Manual: npx expo export --platform web && netlify deploy --prod --dir=dist
#
# ═══════════════════════════════════════════════════════════════════════════════

[build]
  # Base directory (Netlify clones from repo root, mobile/ is the web app)
  base = "mobile/"
  
  # Build command — export Expo as static web
  command = "npx expo export -c --platform web"
  
  # Output directory (relative to base)
  publish = "dist/"

# ── Environment Variables (set these in Netlify Dashboard → Site → Environment) ──
[build.environment]
  NODE_VERSION = "20"
  EXPO_PUBLIC_API_URL = "/api"

# ── API Proxy ────────────────────────────────────────────────────────────────
# Forward /api/* to the AWS backend (avoids CORS & mixed-content issues)
[[redirects]]
  from = "/api/*"
  to = "https://13.50.138.113.nip.io/:splat"
  status = 200
  force = true

# ── SPA Redirect Rules ──────────────────────────────────────────────────────
# All routes → index.html (for client-side routing with expo-router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Custom Headers ───────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_expo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
