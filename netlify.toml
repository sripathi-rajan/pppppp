# DriveLegal — Netlify Configuration
[build]
  base = "mobile"
  command = "npm install && npx expo export --platform web"
  publish = "dist"

[build.environment]
  EXPO_PUBLIC_API_URL = "/api"
  NODE_VERSION = "20"
  CI = "false"

# Proxy API requests to AWS backend (solves HTTPS → HTTP mixed content)
[[redirects]]
  from = "/api/*"
  to = "http://13.50.138.113:8000/:splat"
  status = 200
  force = true

# SPA fallback — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200